  <!-- TRUE OFFLINE SERVICE WORKER SYSTEM (Version 4) -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        const swCode = `
          const CACHE_NAME = 'water-meter-offline-v4';
          const urlsToCache = [
            '/',
            'https://cdn.tailwindcss.com',
            'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css',
            'https://unpkg.com/react@18/umd/react.production.min.js',
            'https://unpkg.com/react-dom@18/umd/react-dom.production.min.js',
            'https://unpkg.com/@babel/standalone/babel.min.js',
            'https://img.icons8.com/color/512/water.png'
          ];

          self.addEventListener('install', event => {
            self.skipWaiting();
            event.waitUntil(
              caches.open(CACHE_NAME).then(cache => cache.addAll(urlsToCache))
            );
          });

          self.addEventListener('activate', event => {
            event.waitUntil(
              caches.keys().then(cacheNames => {
                return Promise.all(
                  cacheNames.map(cacheName => {
                    if (cacheName !== CACHE_NAME) {
                      return caches.delete(cacheName);
                    }
                  })
                );
              })
            );
          });

          self.addEventListener('fetch', event => {
            event.respondWith(
              caches.match(event.request).then(response => {
                if (response) return response; 
                return fetch(event.request).catch(() => console.log('Offline - Network request failed')); 
              })
            );
          });
        `;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(blob);
        navigator.serviceWorker.register(swUrl).catch(err => console.log('Offline setup failed', err));
      });
    }
  </script>

  <div id="root" class="h-full"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const tips = [
      { type: "စီးပွားရေး (Business)", text: "လစဉ်ဝင်ငွေ၊ ထွက်ငွေကို စနစ်တကျ မှတ်တမ်းတင်ခြင်းသည် စီးပွားရေးလုပ်ငန်းတိုင်း၏ အောင်မြင်မှု လျှို့ဝှက်ချက်ဖြစ်သည်။" },
      { type: "မိသားစုအရေး (Family)", text: "မိသားစုဝင်အားလုံး ချွေတာတတ်ရန်နှင့် တာဝန်ယူမှုရှိရန် အချင်းချင်း ဆွေးနွေးတိုင်ပင်ပါ။" },
      { type: "ပညာရေး (Education)", text: "အမှားများကို ပြင်ဆင်ပြီး နည်းပညာအသစ်များကို မကြောက်မရွံ့ လေ့လာခြင်းသည် အကောင်းဆုံးသော ပညာရေးဖြစ်သည်။" },
      { type: "လူမှုရေး (Social)", text: "အများပြည်သူနှင့် ဆက်ဆံရာတွင် ပွင့်လင်းမြင်သာမှုနှင့် တိကျသေချာမှုသည် ယုံကြည်မှုကို တည်ဆောက်ပေးသည်။" }
    ];

    const AppLogo = ({ className }) => (
      <svg viewBox="0 0 100 100" className={className}>
        <defs>
          <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stopColor="#3B82F6" />
            <stop offset="100%" stopColor="#1E3A8A" />
          </linearGradient>
          <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" floodColor="#000000" floodOpacity="0.15" />
          </filter>
        </defs>
        <path d="M50 5 C50 5, 10 40, 10 70 C10 92, 28 100, 50 100 C72 100, 90 92, 90 70 C90 40, 50 5, 50 5 Z" fill="url(#blueGradient)" filter="url(#shadow)"/>
        <text x="50" y="70" fontFamily="sans-serif" fontWeight="900" fontSize="40" fill="white" textAnchor="middle" letterSpacing="-2">wt</text>
      </svg>
    );

    function App() {
      const [activeTab, setActiveTab] = useState('households');
      const [dailyTip, setDailyTip] = useState(tips[0]);
      
      // Load Initial States
      const [rate, setRate] = useState(() => {
        const saved = localStorage.getItem('wt_rate');
        return saved ? parseFloat(saved) : 200; // Updated default rate for example
      });
      
      const [collectorName, setCollectorName] = useState(() => localStorage.getItem('wt_collector') || '');

      const [households, setHouseholds] = useState(() => {
        const saved = localStorage.getItem('wt_households');
        return saved ? JSON.parse(saved) : [];
      });

      const [vouchers, setVouchers] = useState(() => {
        const saved = localStorage.getItem('wt_vouchers');
        return saved ? JSON.parse(saved) : [];
      });

      const [searchQuery, setSearchQuery] = useState('');
      const [showAddHouseModal, setShowAddHouseModal] = useState(false);
      const [newHouseName, setNewHouseName] = useState('');
      const [newHouseNo, setNewHouseNo] = useState('');
      
      const [selectedHouse, setSelectedHouse] = useState(null);
      const [currentReading, setCurrentReading] = useState('');
      const [voucherError, setVoucherError] = useState('');

      useEffect(() => { 
        setDailyTip(tips[Math.floor(Math.random() * tips.length)]); 
      }, []);

      // Auto Save to Local Storage
      useEffect(() => {
        localStorage.setItem('wt_rate', rate.toString());
        localStorage.setItem('wt_collector', collectorName);
        localStorage.setItem('wt_households', JSON.stringify(households));
        localStorage.setItem('wt_vouchers', JSON.stringify(vouchers));
      }, [rate, collectorName, households, vouchers]);

      const handleAddHousehold = () => {
        if (!newHouseName.trim() || !newHouseNo.trim()) return;
        const newHouse = { id: Date.now().toString(), houseNo: newHouseNo, ownerName: newHouseName, lastReading: 0 };
        setHouseholds([...households, newHouse].sort((a, b) => a.houseNo.localeCompare(b.houseNo, undefined, {numeric: true})));
        setNewHouseName(''); 
        setNewHouseNo(''); 
        setShowAddHouseModal(false);
      };

      const handleSaveVoucher = () => {
        setVoucherError('');
        if (!selectedHouse) return;
        if (!collectorName.trim()) { 
          setVoucherError("ကောက်ခံသူအမည် မရှိပါ။ ဆက်တင်တွင် အမည်ထည့်ပါ။"); 
          return; 
        }

        const readingValue = parseFloat(currentReading);
        if (isNaN(readingValue)) { 
          setVoucherError("ဂဏန်းမှန်ကန်စွာ ထည့်ပါ။"); 
          return; 
        }

        const usage = readingValue - selectedHouse.lastReading;
        if (usage < 0) { 
          setVoucherError("ယခုဂဏန်းသည် ယခင်လ ဂဏန်းထက် ငယ်နေပါသည်။"); 
          return; 
        }

        const now = new Date();
        const dateStr = now.toLocaleDateString('en-GB');
        const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

        const newVoucher = {
          id: Date.now().toString(), 
          houseId: selectedHouse.id, 
          houseNo: selectedHouse.houseNo, 
          ownerName: selectedHouse.ownerName,
          collectorName: collectorName, 
          date: dateStr, 
          time: timeStr, 
          previousReading: selectedHouse.lastReading,
          currentReading: readingValue, 
          usage: usage, 
          rate: rate, 
          totalCost: usage * rate, 
          timestamp: now.getTime()
        };

        setVouchers([newVoucher, ...vouchers]);
        const updatedHouseholds = households.map(h => h.id === selectedHouse.id ? { ...h, lastReading: readingValue } : h);
        setHouseholds(updatedHouseholds);
        
        // Reset and go back to household lists or voucher lists
        setCurrentReading(''); 
        setSelectedHouse(null); 
        setActiveTab('vouchers');
      };

      const renderHouseholdsList = () => {
        const filteredHouses = households.filter(h => h.houseNo.includes(searchQuery) || h.ownerName.includes(searchQuery));
        return (
          // Add extra padding at bottom so scrolling works nicely above the navigation bar
          <div className="flex flex-col gap-4 p-4 pb-32">
            <div className="relative">
              <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <i className="fas fa-search text-slate-400"></i>
              </div>
              <input 
                type="text" 
                placeholder="အိမ်အမှတ် သို့မဟုတ် အမည်ရှာရန်..." 
                value={searchQuery} 
                onChange={(e) => setSearchQuery(e.target.value)}
                className="w-full pl-10 pr-4 py-3.5 bg-white border border-slate-200 rounded-xl text-sm outline-none focus:border-blue-500 shadow-sm" 
              />
            </div>
            
            <button onClick={() => setShowAddHouseModal(true)} className="bg-blue-50 text-blue-700 border border-blue-200 py-3.5 rounded-xl flex justify-center items-center gap-2 font-semibold hover:bg-blue-100 shadow-sm transition-colors">
              <i className="fas fa-user-plus"></i> အိမ်ထောင်စု အသစ်ထည့်မည်
            </button>
            
            {households.length === 0 ? (
              <div className="text-center py-12 bg-white rounded-2xl border border-slate-100 shadow-sm">
                 <div className="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-3">
                   <i className="fas fa-users text-2xl text-slate-300"></i>
                 </div>
                 <p className="text-slate-500 text-sm font-medium">အိမ်ထောင်စု စာရင်း မရှိသေးပါ။<br/><span className="text-xs text-slate-400">အသစ်ထည့်ရန် ခလုတ်ကို နှိပ်ပါ။</span></p>
              </div>
            ) : (
              <div className="flex flex-col gap-3">
                {filteredHouses.map(house => (
                  <div key={house.id} className="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex justify-between items-center">
                    <div>
                      <div className="flex items-center gap-2 mb-1">
                        <span className="bg-slate-100 text-slate-700 text-xs font-bold px-2 py-0.5 rounded">အိမ် - {house.houseNo}</span>
                        <h3 className="font-bold text-slate-800">{house.ownerName}</h3>
                      </div>
                      <p className="text-xs text-slate-500">နောက်ဆုံး မီတာဂဏန်း: <span className="font-bold text-slate-700 text-sm">{house.lastReading}</span></p>
                    </div>
                    <button onClick={() => { setSelectedHouse(house); setActiveTab('entry'); }} className="bg-blue-600 text-white px-4 py-2.5 rounded-lg text-sm font-semibold hover:bg-blue-700 active:scale-95 flex items-center gap-1.5 shadow-sm">
                      <i className="fas fa-file-invoice"></i> ဖြတ်မည်
                    </button>
                  </div>
                ))}
              </div>
            )}

            {/* Modal - Add Household */}
            {showAddHouseModal && (
              <div className="fixed inset-0 bg-slate-900/60 z-50 flex justify-center items-center p-4 backdrop-blur-sm">
                <div className="bg-white rounded-2xl w-full max-w-sm p-6 shadow-xl">
                  <h3 className="font-bold text-lg mb-4 flex items-center gap-2"><i className="fas fa-user-plus text-blue-600"></i> အိမ်အသစ်ထည့်ရန်</h3>
                  <div className="space-y-4">
                    <div>
                      <label className="block text-xs font-semibold text-slate-600 mb-1.5">အိမ်အမှတ် / ခြံအမှတ်</label>
                      <input type="text" value={newHouseNo} onChange={e => setNewHouseNo(e.target.value)} className="w-full bg-slate-50 border border-slate-300 rounded-lg p-3 outline-none focus:border-blue-500 focus:bg-white" placeholder="ဥပမာ - ၀၀၁"/>
                    </div>
                    <div>
                      <label className="block text-xs font-semibold text-slate-600 mb-1.5">အိမ်ရှင်အမည်</label>
                      <input type="text" value={newHouseName} onChange={e => setNewHouseName(e.target.value)} className="w-full bg-slate-50 border border-slate-300 rounded-lg p-3 outline-none focus:border-blue-500 focus:bg-white" placeholder="ဥပမာ - ဦးဘ"/>
                    </div>
                  </div>
                  <div className="flex gap-3 mt-6">
                    <button onClick={() => setShowAddHouseModal(false)} className="flex-1 py-3 bg-slate-100 text-slate-700 rounded-xl font-semibold">ပယ်ဖျက်မည်</button>
                    <button onClick={handleAddHousehold} className="flex-1 py-3 bg-blue-600 text-white rounded-xl font-semibold shadow-md active:scale-95 transition-transform">သိမ်းမည်</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      };

      const renderVoucherEntry = () => {
        if (!selectedHouse) return null;
        const currentVal = parseFloat(currentReading);
        let estimatedUsage = 0; let estimatedCost = 0;
        if (!isNaN(currentVal)) { 
          estimatedUsage = currentVal - selectedHouse.lastReading; 
          estimatedCost = estimatedUsage > 0 ? estimatedUsage * rate : 0; 
        }

        return (
          // NOTE: Huge pb-64 padding ensures you can scroll the button up above the keyboard
          <div className="flex flex-col gap-4 p-4 pb-64">
            
            <button onClick={() => setSelectedHouse(null)} className="text-blue-600 text-sm font-semibold flex items-center gap-1.5 w-fit mb-1 bg-blue-50 px-3 py-1.5 rounded-lg active:scale-95">
              <i className="fas fa-arrow-left"></i> နောက်သို့
            </button>
            
            {/* Voucher Info Card */}
            <div className="bg-gradient-to-br from-blue-600 to-blue-800 rounded-2xl p-5 text-white shadow-lg relative overflow-hidden shrink-0">
              <AppLogo className="absolute -right-6 -top-6 w-32 h-32 opacity-10" />
              <div className="relative z-10">
                <div className="flex justify-between items-start mb-4">
                  <div><p className="text-blue-200 text-xs font-medium mb-1">အိမ်အမှတ်</p><p className="text-2xl font-bold">{selectedHouse.houseNo}</p></div>
                  <div className="text-right"><p className="text-blue-200 text-xs font-medium mb-1">အိမ်ရှင်</p><p className="text-lg font-semibold">{selectedHouse.ownerName}</p></div>
                </div>
                <div className="bg-white/20 rounded-xl p-3 flex justify-between items-center backdrop-blur-sm border border-white/10">
                  <span className="text-sm text-blue-100 font-medium">ယခင်လ မီတာဂဏန်း</span>
                  <span className="font-bold text-2xl">{selectedHouse.lastReading}</span>
                </div>
              </div>
            </div>

            {/* Input Form */}
            <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-200 shrink-0 mt-1">
              <label className="block text-slate-800 font-bold mb-3 text-lg">ယခုလ မီတာဂဏန်း ထည့်ပါ</label>
              <input 
                type="number" 
                value={currentReading} 
                onChange={(e) => setCurrentReading(e.target.value)} 
                placeholder="ဂဏန်းရိုက်ထည့်ပါ" 
                autoFocus
                className="w-full bg-slate-50 border-2 border-blue-100 text-slate-900 text-3xl font-black rounded-xl outline-none focus:border-blue-500 focus:bg-white block p-4 text-center tracking-widest transition-colors" 
              />
              {voucherError && <p className="text-red-500 text-sm mt-3 font-semibold text-center bg-red-50 py-2 rounded-lg">{voucherError}</p>}
            </div>

            {/* Live Calculation Result */}
            {!isNaN(currentVal) && estimatedUsage >= 0 && (
              <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-200 space-y-3 shrink-0">
                <div className="flex justify-between items-center pb-3 border-b border-slate-100">
                  <span className="text-slate-500 font-medium">သုံးစွဲမှု</span>
                  <span className="font-bold text-xl text-slate-800">{estimatedUsage} <span className="text-sm font-normal text-slate-500">ယူနစ်</span></span>
                </div>
                <div className="flex justify-between items-center pb-3 border-b border-slate-100">
                  <span className="text-slate-500 font-medium">နှုန်းထား</span>
                  <span className="font-semibold text-slate-700">{rate} <span className="text-sm font-normal text-slate-500">ကျပ်</span></span>
                </div>
                <div className="flex justify-between items-center pt-2">
                  <span className="font-bold text-slate-800 text-lg">ကျသင့်ငွေ</span>
                  <span className="font-black text-3xl text-blue-600">{estimatedCost.toLocaleString()} <span className="text-base font-bold text-slate-500">ကျပ်</span></span>
                </div>
              </div>
            )}

            {/* Fixed Button - Will be scrollable over keyboard */}
            <button 
              onClick={handleSaveVoucher} 
              className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-4 rounded-xl flex justify-center items-center gap-2 active:scale-95 shadow-lg mt-2 shrink-0 transition-transform"
            >
              <i className="fas fa-save text-lg"></i> ဘောင်ချာ သိမ်းမည်
            </button>

          </div>
        );
      };

      const renderHistory = () => (
        <div className="flex flex-col gap-4 p-4 pb-32">
          <div className="flex justify-between items-center mb-2">
            <h2 className="font-bold text-lg text-slate-800 flex items-center gap-2"><i className="fas fa-history text-blue-600"></i> မှတ်တမ်းများ</h2>
            <span className="text-xs text-slate-600 bg-slate-200 px-3 py-1.5 rounded-full font-bold shadow-sm">{vouchers.length} စောင်</span>
          </div>
          
          {vouchers.length === 0 ? (
            <div className="text-center py-14 bg-white rounded-2xl border border-slate-100 shadow-sm">
              <div className="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-3">
                <i className="fas fa-file-invoice text-2xl text-slate-300"></i>
              </div>
              <p className="text-slate-500 text-sm font-medium">မှတ်တမ်း မရှိသေးပါ။</p>
            </div>
          ) : (
            <div className="flex flex-col gap-4">
              {vouchers.map(v => (
                <div key={v.id} className="bg-white rounded-2xl p-0 shadow-sm border border-slate-200 relative overflow-hidden">
                  <div className="bg-slate-50 p-3.5 border-b border-slate-200 flex justify-between items-center">
                    <div className="flex items-center gap-2">
                      <i className="fas fa-check-circle text-emerald-500"></i>
                      <span className="font-bold text-slate-800 tracking-wide">အိမ် - {v.houseNo}</span>
                    </div>
                    <div className="text-right">
                      <p className="text-[10px] text-slate-500 font-bold">{v.date}</p>
                      <p className="text-[10px] text-slate-400 mt-0.5"><i className="far fa-clock"></i> {v.time}</p>
                    </div>
                  </div>
                  <div className="p-4.5 p-4">
                    <div className="flex justify-between items-start mb-5">
                       <div><p className="text-xs text-slate-500 mb-1 font-medium">အိမ်ရှင်</p><p className="font-bold text-slate-800">{v.ownerName}</p></div>
                       <div className="text-right"><p className="text-xs text-slate-500 mb-1 font-medium">ကောက်ခံသူ</p><p className="font-bold text-slate-700">{v.collectorName}</p></div>
                    </div>
                    
                    <div className="bg-blue-50/70 rounded-xl p-3 grid grid-cols-3 gap-2 text-center border border-blue-100">
                      <div><p className="text-[10px] text-slate-500 mb-1 font-semibold">ယခင်</p><p className="font-bold text-slate-700">{v.previousReading}</p></div>
                      <div className="border-x border-blue-200"><p className="text-[10px] text-slate-500 mb-1 font-semibold">ယခု</p><p className="font-bold text-blue-700">{v.currentReading}</p></div>
                      <div><p className="text-[10px] text-slate-500 mb-1 font-semibold">သုံးစွဲမှု</p><p className="font-bold text-slate-800">{v.usage}</p></div>
                    </div>
                    
                    <div className="mt-5 flex justify-between items-end">
                      <p className="text-xs text-slate-500 font-medium">၁ ယူနစ် = {v.rate} ကျပ်</p>
                      <div className="text-right">

                      </div>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );

      const renderSettings = () => (
        <div className="flex flex-col gap-4 p-4 pb-32">
          <h2 className="font-bold text-lg text-slate-800 flex items-center gap-2"><i className="fas fa-cog text-blue-600"></i> ဆက်တင်</h2>
          
          <div className="bg-blue-50 border border-blue-200 rounded-2xl p-4 shadow-sm">
            <span className="bg-blue-200 p-1 rounded text-blue-800 text-[10px] uppercase font-bold mb-2 inline-block shadow-sm">{dailyTip.type}</span>
            <p className="text-slate-800 text-sm font-medium leading-relaxed">"{dailyTip.text}"</p>
          </div>
          
          <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-200">
            <div className="mb-6">

              <input 
                type="text" 
                value={collectorName} 
                onChange={(e) => setCollectorName(e.target.value)} 
                placeholder="အမည်ထည့်ပါ (ဥပမာ- ဦးလှ)" 
                className="w-full bg-slate-50 border border-slate-300 text-slate-900 rounded-xl p-3.5 outline-none focus:border-blue-500 focus:bg-white font-medium"

            </div>
            <div className="mb-6">

              <div className="flex items-center gap-3">
                <input 
                  type="number" 
                  value={rate} 
                  onChange={(e) => setRate(parseFloat(e.target.value) || 0)} 
                  className="w-full bg-slate-50 border border-slate-300 text-slate-900 rounded-xl p-3.5 outline-none focus:border-blue-500 focus:bg-white font-bold text-lg" 
                />
                <span className="font-bold text-slate-600">ကျပ်</span>
              </div>
            </div>
            
            <hr className="mb-6 border-slate-200" />
            
            <button 
              onClick={() => { 
                if(window.confirm("သတိပြုရန် - ဒေတာများအားလုံး ဖျက်မည် သေချာပါသလား? ဖျက်ပြီးပါက ပြန်ယူ၍မရပါ။")) { 
                  setHouseholds([]); 
                  setVouchers([]); 
                  localStorage.clear(); 
                } 
              }} 
              className="w-full font-bold py-3.5 px-4 rounded-xl flex justify-center items-center gap-2 bg-red-50 text-red-600 hover:bg-red-100 transition-colors"
            >
              <i className="fas fa-trash-alt"></i> ဒေတာများအားလုံးဖျက်မည်
            </button>
          </div>
        </div>
      );

      return (
        <div className="h-full w-full flex flex-col relative bg-slate-100 max-w-md mx-auto shadow-2xl">
          {/* Header */}
          <header className="bg-white pt-6 pb-4 px-5 shadow-sm z-10 flex items-center gap-3 shrink-0">
             <AppLogo className="w-11 h-11" />

               <h1 className="font-black text-xl text-slate-800 leading-none tracking-tight">ရေမီတာ ဘောင်ချာ</h1>

             </div>
          </header>
          
          {/* Main Scrollable Content */}
          <main className="flex-1 overflow-y-auto no-scrollbar scroll-smooth">
            {activeTab === 'households' && renderHouseholdsList()}
            {activeTab === 'entry' && renderVoucherEntry()}
            {activeTab === 'vouchers' && renderHistory()}
            {activeTab === 'settings' && renderSettings()}
          </main>

          {/* Bottom Navigation */}
          <nav className="absolute bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 backdrop-blur-md border-t border-slate-200 z-20 pb-safe shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
            <div className="flex justify-around p-1.5">
              <button

                className={`flex-1 flex flex-col items-center py-2.5 rounded-xl transition-colors ${activeTab === 'households' || activeTab === 'entry' ? 'text-blue-600 bg-blue-50' : 'text-slate-400 hover:text-slate-600 hover:bg-slate-50'}`}

            </div>
          </nav>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
